[agents]
max_threads = 6
max_depth = 2

[agents.orchestrator]
description = "Execution-team coordinator that implements a root-approved approach through the five Slim specialists."
config_file = "agents/orchestrator.toml"

[agents.oracle]
description = "Read-only strategic advisor for architecture, difficult debugging, risk, simplification, and code review."
config_file = "agents/oracle.toml"

[agents.librarian]
description = "Read-only specialist for current official documentation, authoritative sources, and library research."
config_file = "agents/librarian.toml"

[agents.explorer]
description = "Fast read-only codebase reconnaissance for files, symbols, patterns, visual evidence, and relevant lines."
config_file = "agents/explorer.toml"

[agents.designer]
description = "UI/UX design, visual review, and implementation specialist for user-visible quality and polish."
config_file = "agents/designer.toml"

[agents.fixer]
description = "Bounded implementation specialist that executes clear specifications without research or architectural expansion."
config_file = "agents/fixer.toml"

[agents.council]
description = "Council chair that selects matching installed agents by description and synthesizes their independent advice."
config_file = "agents/council.toml"
