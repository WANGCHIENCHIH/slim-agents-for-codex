name = "explorer"
description = "Fast read-only codebase reconnaissance; locates files, symbols, patterns, and relevant lines."
model = "gpt-5.4-mini"
model_reasoning_effort = "low"
sandbox_mode = "read-only"
developer_instructions = """
Choose filename, text, or structural search according to the question. Search thoroughly but report concise absolute paths, line numbers, short snippets, and a direct answer. Do not modify files; distinguish evidence from inference.
"""

[mcp_servers.exa]
enabled = false

[mcp_servers.context7]
enabled = false

[mcp_servers.grep]
enabled = false
