name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release (for example, v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: node -e 'const p=require("./package.json"); if (`v${p.version}` !== process.env.RELEASE_TAG) throw new Error(`tag ${process.env.RELEASE_TAG} does not match package ${p.version}`)'

      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: npm run snapshots

      - name: Build release package
        id: package
        shell: bash
        run: |
          package_file="$(npm pack --silent)"
          echo "file=${package_file}" >> "$GITHUB_OUTPUT"
          sha256sum "$package_file" > "${package_file}.sha256"

      - name: Smoke-test packed agent and Skill installation
        env:
          PACKAGE_FILE: ${{ steps.package.outputs.file }}
        shell: bash
        run: |
          smoke_root="$(mktemp -d)"
          npm install --prefix "$smoke_root/npm" "./$PACKAGE_FILE"
          cli="$smoke_root/npm/node_modules/.bin/slim-agents-codex"
          "$cli" list-presets | grep 'latest -> openai-5.6.1'
          "$cli" install --preset openai-5.6.1 \
            --codex-home "$smoke_root/codex" \
            --skills-home "$smoke_root/skills" \
            --yes
          "$cli" validate --preset openai-5.6.1 \
            --codex-home "$smoke_root/codex" \
            --skills-home "$smoke_root/skills"
          test -f "$smoke_root/skills/slim-council/SKILL.md"
          test -f "$smoke_root/skills/slim-orchestration/SKILL.md"

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## Installation

          Download the attached `.tgz`, then run:

          ```bash
          npm install --global ./slim-agents-for-codex-<version>.tgz
          slim-agents-codex list-presets
          slim-agents-codex install --preset openai-5.6.1 --scope global
          ```

          Existing `0.1.x` installations should use `switch-preset` instead of `install`.

          The package is distributed through GitHub and is not published to the npm registry.

          The install command deploys the selected agent preset and both managed Slim Skills. See `README.md` or `README.zh-TW.md` for project-scoped and manual installation instructions.
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PACKAGE_FILE: ${{ steps.package.outputs.file }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to overwrite its assets." >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" "$PACKAGE_FILE" "${PACKAGE_FILE}.sha256" \
            --title "$RELEASE_TAG" --notes-file release-notes.md \
            --repo "$GITHUB_REPOSITORY"
